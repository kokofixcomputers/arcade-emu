<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Emulator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      /* Mirrors the design tokens in src/index.css so this static page
         (not processed by Vite, can't import the app's CSS vars) stays in
         sync with the rest of the app's dark amber/CRT theme. */
      :root {
        --ink: #0a0a0c;
        --ink-raised: #131316;
        --ink-card: #1a1a1e;
        --line: #2c2c32;
        --paper: #f4efe6;
        --paper-dim: #a8a29a;
        --amber: #ffb238;
        --amber-dim: #c98f2c;
        --r-sm: 6px;
        --r-md: 12px;
        --font-body: 'JetBrains Mono', ui-monospace, 'SFMono-Regular', Menlo, monospace;
        --font-display: 'Press Start 2P', 'Courier New', monospace;
      }
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: var(--ink);
        overflow: hidden;
      }
      #game {
        width: 100%;
        height: 100%;
      }
      /* EmulatorJS's own stylesheet loads dynamically after this and sets
         a 3px radius with a more specific selector, so !important is needed
         to round the hover/active highlight on the control bar buttons. */
      .ejs_menu_button {
        border-radius: var(--r-sm) !important;
      }
      /* EmulatorJS's own download/decompress step is just a plain gray text
         node (.ejs_loading_text) with no visual bar. Hide it and drive our
         own styled overlay from its text instead (see script below). */
      .ejs_loading_text {
        opacity: 0 !important;
      }
      #ejs-progress-overlay {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--ink);
        font-family: var(--font-body);
        color: var(--paper);
      }
      #ejs-progress-overlay.ejs-progress-overlay--hidden {
        display: none;
      }
      .ejs-progress-card {
        width: min(420px, 80vw);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.1rem;
        padding: 2rem 2.25rem;
        background: var(--ink-raised);
        border: 1.5px solid var(--line);
        border-radius: var(--r-md);
      }
      .ejs-progress-label {
        font-size: 0.82rem;
        color: var(--paper-dim);
        text-align: center;
        letter-spacing: 0.02em;
      }
      .ejs-progress-track {
        width: 100%;
        height: 8px;
        border-radius: 999px;
        background: var(--ink-card);
        border: 1px solid var(--line);
        overflow: hidden;
      }
      .ejs-progress-fill {
        height: 100%;
        width: 0%;
        border-radius: 999px;
        background: var(--amber);
        transition: width 0.2s ease;
      }
      .ejs-progress-fill--indeterminate {
        width: 40% !important;
        animation: ejs-progress-slide 1.1s ease-in-out infinite;
      }
      @keyframes ejs-progress-slide {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(350%); }
      }

      /* EmulatorJS's popups (Control Settings, Cheats, Netplay, confirm
         dialogs, etc.) all share these classes — restyled once here to
         match the rest of the app instead of the library's default light
         panels and stark white key-capture inputs. */
      .ejs_popup_container {
        background: rgba(10, 10, 12, 0.88) !important;
      }
      .ejs_popup_container *,
      .ejs_popup_container *::before,
      .ejs_popup_container *::after {
        color: var(--paper) !important;
        font-family: var(--font-body) !important;
      }
      /* Restyle text inputs (cheats, key capture, etc.) to match dark theme */
      .ejs_popup_container input[type='text'],
      .ejs_popup_container input[type='number'],
      .ejs_popup_container input[type='search'],
      .ejs_popup_container input[type='tel'] {
        background-color: var(--ink-card) !important;
        border: 1.5px solid var(--line) !important;
        color: var(--paper) !important;
        -webkit-text-fill-color: var(--paper) !important;
        border-radius: var(--r-sm) !important;
        padding: 0.25rem 0.5rem !important;
      }
      .ejs_popup_container h4 {
        font-family: var(--font-display) !important;
        font-size: 0.85rem !important;
        font-weight: 400;
        color: var(--amber) !important;
        letter-spacing: 0.02em;
        text-transform: uppercase;
        padding: 1.4rem 3rem 1rem !important;
      }
      .ejs_popup_box {
        background: var(--ink-raised) !important;
        border: 1.5px solid var(--line);
        border-radius: var(--r-md);
      }
      .ejs_popup_container_box {
        background: rgba(10, 10, 12, 0.75) !important;
      }
      .ejs_button,
      .ejs_button_button {
        background: transparent !important;
        border: 1.5px solid var(--line) !important;
        border-radius: var(--r-sm) !important;
        font-weight: 600;
        transition: border-color 0.15s ease, color 0.15s ease;
      }
      .ejs_button:hover,
      .ejs_button_button:hover {
        border-color: var(--amber-dim) !important;
        color: var(--amber) !important;
      }
      /* Control Settings key-capture fields: EmulatorJS hardcodes these as
         plain white <input type="text">s, which is the "browser field"
         look this overrides. */
      .ejs_control_body input[type='text'] {
        background-color: var(--ink-card) !important;
        border: 1.5px solid var(--line) !important;
        border-radius: var(--r-sm) !important;
        color: var(--paper) !important;
        /* WebKit (Tauri's macOS webview) renders readonly/disabled form
           control text via -webkit-text-fill-color, ignoring plain `color`
           and falling back to a near-black default regardless of theme. */
        -webkit-text-fill-color: var(--paper) !important;
        opacity: 1 !important;
        font-weight: 600;
        text-align: center;
      }
      /* The gamepad-device picker is a native <select> — same WebKit/appearance
         issue applies, plus browsers often ignore author styling on the open
         option list unless the native chrome is stripped first. */
      .ejs_popup_container select {
        background-color: var(--ink-card) !important;
        color: var(--paper) !important;
        -webkit-text-fill-color: var(--paper) !important;
        border: 1.5px solid var(--line) !important;
        border-radius: var(--r-sm) !important;
        -webkit-appearance: none;
        appearance: none;
        padding: 0.25rem 0.5rem;
      }
      .ejs_popup_container select option {
        background-color: var(--ink-card) !important;
        color: var(--paper) !important;
      }
      .ejs_control_player_bar a {
        color: var(--paper-dim) !important;
      }
      .ejs_control_player_bar li:hover:not(.ejs_control_selected) {
        background-color: var(--ink-card) !important;
        border-bottom-color: var(--ink-card) !important;
      }
      .ejs_control_selected {
        background-color: var(--amber) !important;
        border-bottom-color: var(--amber) !important;
      }
      .ejs_control_selected a {
        color: var(--amber-ink) !important;
      }
      .ejs_control_bar:hover {
        background-color: var(--ink-card) !important;
      }
      .ejs_control_set_button {
        background-color: var(--amber) !important;
        color: var(--amber-ink) !important;
        border-radius: var(--r-sm) !important;
      }
      /* Custom circular X close button, tagged onto each popup's "Close"
         link by the script below (EmulatorJS itself only renders it as a
         plain text link in the button row, no corner close affordance). */
      .ejs-popup-close {
        position: absolute !important;
        top: 14px !important;
        right: 14px !important;
        margin: 0 !important;
        width: 30px !important;
        height: 30px !important;
        padding: 0 !important;
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
        border-radius: 50% !important;
        background: var(--ink-card) !important;
        border: 1.5px solid var(--line) !important;
        font-size: 0 !important;
      }
      .ejs-popup-close::before {
        content: '\2715';
        font-size: 13px;
        font-family: var(--font-body);
        line-height: 1;
      }
      .ejs-popup-close:hover {
        border-color: #e5484d !important;
      }
      .ejs-popup-close:hover::before {
        color: #e5484d !important;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <div id="ejs-progress-overlay" class="ejs-progress-overlay--hidden">
      <div class="ejs-progress-card">
        <p class="ejs-progress-label" id="ejs-progress-label">Loading...</p>
        <div class="ejs-progress-track">
          <div class="ejs-progress-fill" id="ejs-progress-fill"></div>
        </div>
      </div>
    </div>
    <script>
      // This page is loaded inside an <iframe> by the React app and is kept
      // isolated on purpose: EmulatorJS's loader.js sets globals (window.EJS_*)
      // and injects its UI straight into the DOM, which is incompatible with
      // React managing this same document. A fresh iframe per ROM keeps every
      // load state clean, no manual teardown of EmulatorJS internals needed.
      window.addEventListener("message", function (event) {
        if (event.origin !== window.location.origin) return;
        var data = event.data;
        if (!data || data.type !== "ejs-boot") return;

        window.EJS_player = "#game";
        window.EJS_core = data.core;
        // Relative, not root-absolute: this file isn't processed by Vite's
        // base-path rewriting (it's a static /public asset copied as-is), so
        // an absolute "/data/" would 404 on GitHub Pages project sites
        // served from /<repo-name>/ instead of the domain root. Relative
        // paths resolve against this document's own URL either way.
        window.EJS_pathtodata = "data/";
        window.EJS_gameUrl = data.file;
        window.EJS_gameName = data.fileName;
        // Without this, EmulatorJS derives its settings-storage key from
        // gameName/gameUrl with several fallback branches (and warns that
        // omitting it "may result in settings persisting across games").
        // Using our own stable library-entry id removes that ambiguity, so
        // remapped controls/cheats/settings for a given ROM survive exiting
        // and relaunching it (including across a full page refresh).
        window.EJS_gameID = data.gameId;
        window.EJS_startOnLoaded = true;
        window.EJS_color = "#ffb238";

        var overlay = document.getElementById("ejs-progress-overlay");
        var label = document.getElementById("ejs-progress-label");
        var fill = document.getElementById("ejs-progress-fill");
        overlay.classList.remove("ejs-progress-overlay--hidden");

        // EmulatorJS's download/decompress progress only exists as plain
        // text on .ejs_loading_text (e.g. "Download Game Core 45%"), no
        // dedicated progress element. Watch it and drive our own bar instead.
        var progressObserver = new MutationObserver(function () {
          var textElem = document.querySelector("#game .ejs_loading_text");
          if (!textElem) return;
          var text = textElem.innerText || "";
          var match = text.match(/(\d+(?:\.\d+)?)%\s*$/);
          if (match) {
            fill.classList.remove("ejs-progress-fill--indeterminate");
            fill.style.width = match[1] + "%";
            label.innerText = text.slice(0, match.index).trim();
          } else {
            fill.classList.add("ejs-progress-fill--indeterminate");
            label.innerText = text;
          }
        });
        progressObserver.observe(document.getElementById("game"), {
          childList: true,
          subtree: true,
          characterData: true,
        });

        // EmulatorJS's popups (Control Settings, Cheats, Netplay, ...) only
        // render "Close" as a plain text link in the button row — there's no
        // dedicated close-icon element to style. Tag it once per popup so
        // the .ejs-popup-close CSS above can turn it into a corner X button.
        var popupObserver = new MutationObserver(function (mutations) {
          mutations.forEach(function (mutation) {
            mutation.addedNodes.forEach(function (node) {
              if (!(node instanceof HTMLElement)) return;
              var popups = node.classList && node.classList.contains("ejs_popup_container")
                ? [node]
                : Array.from(node.querySelectorAll ? node.querySelectorAll(".ejs_popup_container") : []);
              popups.forEach(function (popup) {
                var closeBtn = Array.from(popup.querySelectorAll("a.ejs_button")).find(function (a) {
                  return a.textContent.trim().toLowerCase() === "close";
                });
                if (closeBtn) closeBtn.classList.add("ejs-popup-close");
              });
            });
          });
        });
        popupObserver.observe(document.getElementById("game"), { childList: true, subtree: true });

        // This build's loader.js never reads window.EJS_onExit (that hook
        // only exists in EmulatorJS's newer, ESM-based loader.js). Instead,
        // it exposes the emulator instance as window.EJS_emulator once
        // ready, so poll for it and attach listeners directly.
        var exitWireInterval = setInterval(function () {
          if (!window.EJS_emulator || typeof window.EJS_emulator.on !== "function") return;
          clearInterval(exitWireInterval);
          window.EJS_emulator.on("exit", function () {
            window.parent.postMessage({ type: "ejs-exit" }, window.location.origin);
          });
          window.EJS_emulator.on("start", function () {
            progressObserver.disconnect();
            overlay.classList.add("ejs-progress-overlay--hidden");
          });
        }, 100);
        if (data.couchMode) {
          // EmulatorJS auto-detects a physical gamepad via the standard
          // Gamepad API on its own (data/src/gamepad.js) — nothing extra
          // needed there. The only thing worth doing for a couch/controller
          // session is hiding the on-screen touch gamepad overlay, which is
          // just noise when a real controller is already driving input.
          window.EJS_defaultOptions = { "virtual-gamepad": "disabled" };
        }

        var script = document.createElement("script");
        script.src = "data/loader.js";
        document.body.appendChild(script);
      });
    </script>
  </body>
</html>
